<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Devyani Arya — Software Engineer - Product." />
  <title>Devyani Arya</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            void: '#09080B',
            ink: '#16121A',
            plum: '#221D24',
            orchid: '#2C252D',
            cyan: {
              50: '#F2F5F7',
              100: '#DEE6EA',
              200: '#C7D3D9',
              300: '#AEBFC7',
              400: '#8FA4AE',
              500: '#6F838E',
              600: '#5F727E',
              700: '#4E5F69',
              800: '#3E4C54',
              900: '#303A40',
            },
            magenta: {
              50: '#FBF7F0',
              100: '#F3E8D7',
              200: '#E6D2B0',
              300: '#D8BA88',
              400: '#CDAA72',
              500: '#C2A06B',
              600: '#B08E5E',
              700: '#97663A',
              800: '#7D5532',
              900: '#66462B',
            },
            rose: {
              400: '#B88E6A',
              500: '#A97B55',
              600: '#97663A',
              700: '#7E5633',
            },
            vellum: '#F1EAE2',
            cream: '#F7F2EC',
            parchment: '#FFFDF9',
            inklight: '#231B17',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'monospace'],
          },
          boxShadow: {
            page: '0 30px 100px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.06)',
            pageLight: '0 28px 90px rgba(28,25,23,0.08), inset 0 1px 0 rgba(255,255,255,0.9)',
            holo: '0 0 60px #6F838E24, 0 0 120px #C2A06B2E',
            editorial: '0 1px 0 rgba(0,0,0,0.06), 0 24px 48px -12px rgba(0,0,0,0.12)',
          },
        },
      },
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    try {
      if (localStorage.getItem('codexTheme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.classList.remove('dark');
      }
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-full bg-cream font-sans text-inklight antialiased transition-colors duration-500 selection:bg-cyan-500/25 selection:text-inklight dark:bg-void dark:text-vellum dark:selection:text-white">
  <a href="#book" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[220] focus:rounded-md focus:bg-cyan-500 focus:px-3 focus:py-2 focus:text-void">Skip to codex</a>

  <div id="pageLoader" class="page-loader" role="status" aria-live="polite" aria-busy="true" aria-label="Loading portfolio">
    <p class="loader-label">Loading</p>
    <div id="loaderPct" class="loader-pct">00%</div>
    <p class="loader-mark"> </p>
  </div>

  <div id="bgPulse" class="pointer-events-none fixed inset-0 z-[3]" aria-hidden="true"></div>
  <canvas id="netCanvas" class="pointer-events-none fixed inset-0 z-[4]" aria-hidden="true"></canvas>
  <canvas id="floatCanvas" class="pointer-events-none fixed inset-0 z-[5]" aria-hidden="true"></canvas>
  <div class="pointer-events-none fixed inset-0 z-[6] noise noise-anim opacity-30 dark:opacity-50" aria-hidden="true"></div>
  <div id="ambient" class="pointer-events-none fixed inset-0 z-[7] overflow-hidden" aria-hidden="true"></div>

  <!-- Theme + sound + bot -->
  <div class="fixed right-3 top-3 z-[125] flex items-center gap-2 md:right-6 md:top-5">
    <button type="button" id="codexFab" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-stone-200/35 bg-cream/90 p-0 text-inklight shadow-editorial backdrop-blur-md transition hover:scale-[1.03] dark:border-white/20 dark:bg-ink/95 dark:text-vellum dark:shadow-none" aria-label="Open ASK assistant" aria-expanded="false" aria-controls="codexPanel">
      <svg class="block" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 5C4 3.89543 4.89543 3 6 3H14C16.2091 3 18 4.79086 18 7V12C18 14.2091 16.2091 16 14 16H9L5 20V7C4 7 4 6.10457 4 5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 7H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <path d="M8 10.5H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
      </svg>
    </button>
    <button type="button" id="soundBtn" class="flex h-10 w-10 items-center justify-center rounded-full border border-stone-200/25 bg-cream/90 text-[0.68rem] text-inklight shadow-editorial backdrop-blur-md transition hover:border-stone-300 dark:border-white/15 dark:bg-ink/90 dark:text-vellum/70 dark:shadow-none" aria-pressed="true" aria-label="Page turn sound on" title="Page sound">♪</button>
    <button type="button" id="themeToggle" class="flex h-10 w-10 items-center justify-center rounded-full border border-stone-200/25 bg-cream/90 text-inklight shadow-editorial backdrop-blur-md transition hover:border-stone-300 dark:border-white/15 dark:bg-ink/90 dark:text-vellum" aria-label="Toggle light theme">
      <svg id="iconSun" class="hidden h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="iconMoon" class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    </button>
  </div>

  <div class="pointer-events-none fixed right-0 top-0 z-[90] flex h-full w-2.5 justify-center md:w-3.5" aria-hidden="true">
    <div class="relative h-full w-full bg-gradient-to-b from-plum/90 to-orchid/50 dark:from-plum/90 dark:to-orchid/50" id="ribbonTrack">
      <div id="ribbon" class="ribbon-fill absolute bottom-0 left-0 right-0 bg-gradient-to-t from-cyan-500/75 to-rose-400/45 dark:from-cyan-500/75 dark:to-magenta-500/40" style="height:12.5%"></div>
      <div class="absolute -left-1 bottom-8 h-10 w-7 rounded-sm bg-gradient-to-br from-cyan-400/30 to-rose-400/25 shadow-holo md:-left-1.5 md:w-9 dark:from-cyan-400/30 dark:to-magenta-500/25"></div>
    </div>
  </div>

  <aside id="toc" class="fixed left-0 top-0 z-[100] flex h-full w-[min(15rem,86vw)] -translate-x-full flex-col border-r border-stone-200/30 bg-cream/95 py-20 pl-4 pr-3 backdrop-blur-2xl transition-transform duration-500 dark:border-white/10 dark:bg-ink/95 md:translate-x-0 md:py-24 md:pl-5 dark:md:bg-ink/85" aria-label="Table of contents">
    <p class="font-mono text-[0.55rem] uppercase tracking-[0.4em] text-stone-500 dark:text-cyan-400/80">Index</p>
    <nav id="tocNav" class="mt-6 flex flex-col gap-0.5 font-mono text-[0.7rem]"></nav>
    <p class="mt-auto font-mono text-[0.5rem] leading-relaxed text-stone-400 dark:text-vellum/30">Sound can be muted, top right.</p>
  </aside>
  <button type="button" id="tocToggle" class="fixed left-3 top-3 z-[110] flex h-11 w-11 items-center justify-center rounded-lg border border-stone-200/40 bg-cream/90 text-inklight shadow-sm backdrop-blur dark:border-white/15 dark:bg-ink/90 dark:text-cyan-300 md:hidden" aria-controls="toc" aria-expanded="false" aria-label="Open index">≡</button>

  <main id="book" class="book-stage relative z-20 ml-0 flex h-full min-h-0 flex-col md:ml-[15rem]">
    <div class="flex min-h-0 flex-1 flex-col px-3 pb-4 pt-14 md:px-10 md:pb-8 md:pt-20">
      <div id="stack" class="preserve-3d relative min-h-0 flex-1" role="region" aria-live="polite" aria-label="Journal pages"></div>
      <div class="mt-4 flex shrink-0 items-center justify-between gap-3 border-t border-stone-200/40 pt-4 font-mono text-[0.65rem] uppercase tracking-[0.25em] text-stone-500 dark:border-white/10 dark:text-vellum/40">
        <button type="button" id="prev" class="magnetic glow-ring rounded-lg border border-stone-200/50 px-4 py-2.5 text-inklight/80 transition dark:border-white/10 dark:text-vellum/80">← Prev</button>
        <span id="pgLabel" class="hidden text-cyan-600 dark:text-cyan-400/90 sm:inline">Cover</span>
        <button type="button" id="next" class="magnetic glow-ring rounded-lg border border-stone-200/50 px-4 py-2.5 text-inklight/80 transition dark:border-white/10 dark:text-vellum/80">Next →</button>
      </div>
    </div>
  </main>

  <!-- ASK bot -->
  <div id="codexPanel" class="fixed right-3 top-16 bottom-4 z-[140] hidden w-[min(92vw,24rem)] flex-col overflow-y-auto rounded-2xl border border-stone-200/50 bg-cream/98 p-4 shadow-editorial sm:bottom-auto sm:max-h-[calc(100vh-5rem)] sm:p-5 dark:border-white/15 dark:bg-ink/98 md:right-6 md:top-20 md:max-h-[calc(100vh-6rem)]" role="dialog" aria-labelledby="codexTitle" aria-modal="true">
    <div class="flex items-center justify-between gap-3 border-b border-stone-200/50 pb-3 dark:border-white/10">
      <h2 id="codexTitle" class="font-display text-xl italic text-inklight dark:text-vellum">ASK</h2>
      <button type="button" id="codexClose" class="rounded-full p-2 text-stone-500 hover:bg-stone-100 dark:text-vellum/50 dark:hover:bg-white/5" aria-label="Close chat"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <p class="mt-3 font-mono text-[0.6rem] leading-relaxed text-stone-500 dark:text-vellum/45">Ask about Devyani — answers are retrieved via pattern matching.</p>
    <div class="mt-4 flex gap-2">
      <input id="codexQ" type="text" class="flex-1 rounded-xl border border-stone-200/80 bg-white px-3 py-2.5 font-mono text-sm text-inklight placeholder:text-stone-400 dark:border-white/15 dark:bg-void/80 dark:text-vellum dark:placeholder:text-vellum/35" placeholder="e.g. RAG experience?" autocomplete="off" />
      <button type="button" id="codexAsk" class="rounded-xl bg-stone-900 px-4 py-2 font-mono text-xs uppercase tracking-wider text-cream dark:bg-cyan-500/25 dark:text-cyan-200">Ask</button>
    </div>
    <p id="codexA" class="mt-4 border-l-2 border-cyan-500/40 pl-4 text-sm leading-relaxed text-inklight/90 dark:text-vellum/85"></p>
  </div>
  <div id="skillTooltip" class="fixed rounded-xl border border-stone-200/80 bg-cream/98 px-4 py-3 text-sm shadow-editorial dark:border-white/15 dark:bg-ink/95 dark:text-vellum" role="tooltip" hidden></div>

  <template id="tPage">
    <div class="page-sheet absolute inset-0">
      <div class="page-face relative flex h-full min-h-0 flex-col overflow-hidden rounded-sm border border-stone-200/40 dark:border-white/10">
        <div class="page-edge"></div>
        <div class="noise pointer-events-none absolute inset-0 opacity-30 dark:opacity-40" style="opacity:var(--noise-op,0.35)"></div>
        <div class="page-inner relative z-10 flex min-h-0 flex-1 flex-col overflow-hidden p-6 md:p-10 md:pr-12"></div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
