<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>

            },

              50: '#FBF7F0',
              100: '#F3E8D7',
              200: '#E6D2B0',
              300: '#D8BA88',
              400: '#CDAA72',
              500: '#C2A06B',
              600: '#B08E5E',
              700: '#97663A',
              800: '#7D5532',
              900: '#66462B',
            },

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    try {
      if (localStorage.getItem('codexTheme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.classList.remove('dark');
      }
    } catch (e) {}
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    :root,
    [data-theme="dark"] {
      --theme-bg: #09080B;
      --theme-page-bg: #16121A;
      --theme-card-bg: #16121A;
      --theme-accent-primary: #C2A06B;
      --theme-accent-secondary: #6F838E;
      --theme-text-primary: #F1EAE2;
      --theme-text-secondary: #B6AAA0;
      --theme-text-heading: #FBF5EE;
      --theme-border: #3A3138;
      --theme-glow: #C2A06B2E;
      --theme-glow-secondary: #6F838E24;
      --gh-surface: #11151A;
      --gh-tile-stroke: #2B3640;
      --gh-tile-0: #1A232A;
      --gh-tile-1: #263640;
      --gh-tile-2: #36505E;
      --gh-tile-3: #4A6C7E;
      --gh-tile-4: #6F838E;

      --page-bg: var(--theme-page-bg);
      --text-primary: var(--theme-text-primary);
      --text-muted: var(--theme-text-secondary);
      --border-subtle: var(--theme-border);
      --noise-op: 0.36;

      --card-hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(194, 160, 107, 0.18);
      --card-hover-border: rgba(111, 131, 142, 0.45);
    }
    [data-theme="light"] {
      --theme-bg: #F7F2EC;
      --theme-page-bg: #FFFDF9;
      --theme-card-bg: #FFFDF9;
      --theme-accent-primary: #97663A;
      --theme-accent-secondary: #5F727E;
      --theme-text-primary: #231B17;
      --theme-text-secondary: #6D5F54;
      --theme-text-heading: #17110E;
      --theme-border: #D8C8B8;
      --theme-glow: #97663A1F;
      --theme-glow-secondary: #5F727E1A;
      --gh-surface: #FFFCF8;
      --gh-tile-stroke: #D9C9B8;
      --gh-tile-0: #F3E8DC;
      --gh-tile-1: #E4D0BA;
      --gh-tile-2: #CCAD8A;
      --gh-tile-3: #B5875B;
      --gh-tile-4: #97663A;

      --page-bg: var(--theme-page-bg);
      --text-primary: var(--theme-text-primary);
      --text-muted: var(--theme-text-secondary);
      --border-subtle: var(--theme-border);
      --noise-op: 0.11;

      --card-hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      --card-hover-border: rgba(95, 114, 126, 0.4);
    }
    [data-theme="light"] body,
    [data-theme="light"] body .page-inner {
      color: var(--text-primary);
    }
    body,
    p,
    li,
    span,
    div,
    label,
    input,
    textarea,
    button,
    a {
      font-family: Outfit, system-ui, sans-serif;
    }
    .font-mono,
    code,
    pre {
      font-family: "IBM Plex Mono", monospace !important;
    }
    h1, h2, h3, h4, h5, h6, .font-display {
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    .noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    }
    .book-stage { perspective: 2000px; perspective-origin: 50% 42%; }
    .preserve-3d { transform-style: preserve-3d; }
    .page-sheet { transform-origin: left center; transform-style: preserve-3d; will-change: transform, opacity, filter; }
    .page-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--page-bg);
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }
    html:not([data-theme="light"]) .page-face {
      box-shadow: 0 25px 80px rgba(0,0,0,0.55), inset 0 0 80px #6F838E24;
    }
    [data-theme="light"] .page-face {
      box-shadow: var(--tw-shadow-pageLight, 0 28px 90px rgba(28,25,23,0.08));
    }
    .page-edge {
      position: absolute; top: 0; right: 0; bottom: 0; width: 12px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.35));
      pointer-events: none; opacity: 0.55;
    }
    [data-theme="light"] .page-edge { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06)); opacity: 0.9; }
    .ambient-line {
      position: fixed; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem;
      white-space: nowrap; pointer-events: none; z-index: 5;
      animation: drift 28s ease-in-out infinite;
    }
    html:not([data-theme="light"]) .ambient-line { color: #6F838E24; }
    [data-theme="light"] .ambient-line { color: #5F727E1A; }
    @keyframes drift {
      0%, 100% { opacity: 0.15; transform: translate(0, 0); }
      50% { opacity: 0.35; transform: translate(8px, -12px); }
    }
    .ribbon-fill { transition: height 0.55s cubic-bezier(0.4, 0, 0.2, 1); }
    .magnetic {
      transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1),
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out,
        color 350ms ease-out;
    }
    .cover-cta-primary,
    .cover-cta-secondary {
      transition: transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out,
        color 350ms ease-out;
    }
    .cover-cta-primary {
      box-shadow: 0 2px 0 rgba(28, 25, 23, 0.08);
    }
    [data-theme="light"] .cover-cta-primary:hover {
      box-shadow: 0 8px 24px rgba(28, 25, 23, 0.12), 0 0 0 1px #97663A1F;
      transform: translateY(-4px);
    }
    html:not([data-theme="light"]) .cover-cta-primary:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px #C2A06B2E;
      transform: translateY(-4px);
    }
    .cover-cta-secondary:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .glow-ring {
      transition: transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out,
        color 350ms ease-out;
    }
    .glow-ring:hover { box-shadow: 0 0 0 1px #6F838E24, 0 0 28px #C2A06B2E; }
    [data-theme="light"] .glow-ring:hover { box-shadow: 0 0 0 1px #5F727E1A, 0 12px 32px #97663A1F; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .pipeline-shimmer {
      animation: shimmer 2.5s linear infinite;
      background: linear-gradient(90deg, transparent, #6F838E24, transparent);
      background-size: 200% 100%;
    }
    [data-theme="light"] .pipeline-shimmer {
      background: linear-gradient(90deg, transparent, #5F727E1A, transparent);
    }
    .experience-scroll {
      scrollbar-width: thin;
      scrollbar-color: #6F838E24 transparent;
      overflow-x: hidden;
      padding: 0 4px 4px 0;
      margin: 0;
      background: transparent;
    }
    .experience-scroll::-webkit-scrollbar { width: 5px; }
    .experience-scroll::-webkit-scrollbar-thumb { background: rgba(111,131,142,0.25); border-radius: 99px; }
    [data-theme="light"] .experience-scroll::-webkit-scrollbar-thumb { background: #5F727E1A; }
    .experience-scroll > .experience-card {
      margin: 0;
    }
    .experience-card {
      isolation: isolate;
      overflow: hidden;
      padding: 24px;
      border-radius: 16px;
      background-size: 100% 100%;
      background-position: 50% 50%;
      background-clip: padding-box;
      transform: translate3d(0, 0, 0);
      will-change: transform, box-shadow, border-color, background-color;
      transition:
        transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out;
    }
    @media (min-width: 768px) {
      .experience-card { padding: 32px; }
    }
    .experience-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid transparent;
      pointer-events: none;
      opacity: 0;
      transform: scale(1);
      transition: border-color 350ms ease-out,
        opacity 350ms ease-out;
    }
    .experience-card:hover,
    .experience-card:focus-within {
      transform: translate3d(0, -4px, 0);
      border-color: var(--card-hover-border);
      box-shadow: var(--card-hover-shadow);
    }
    .experience-card:hover::after,
    .experience-card:focus-within::after {
      opacity: 1;
      border-color: rgba(194, 160, 107, 0.35);
    }
    .experience-card h3 {
      font-size: 1.5rem;
      line-height: 1.3;
    }
    .experience-card p,
    .experience-card li span {
      font-family: Outfit, system-ui, sans-serif;
    }
    .experience-card ul {
      margin-top: 1.75rem;
    }
    .experience-card ul li {
      font-size: 0.95rem;
      line-height: 1.75;
    }
    .page-inner a.group.block.rounded-2xl,
    .page-inner a.group.rounded-2xl {
      background-clip: padding-box;
      transform: translate3d(0, 0, 0);
      will-change: transform, box-shadow, border-color, background-color;
      transition:
        transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out;
    }
    .page-inner a.group.block.rounded-2xl:hover,
    .page-inner a.group.block.rounded-2xl:focus-visible,
    .page-inner a.group.rounded-2xl:hover,
    .page-inner a.group.rounded-2xl:focus-visible {
      transform: translate3d(0, -4px, 0);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--card-hover-border);
    }
    .page-inner .rounded-2xl {
      transition:
        transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out;
    }
    #tocNav button {
      transition: background-color 350ms ease-out,
        color 350ms ease-out,
        border-bottom-color 350ms ease-out,
        opacity 350ms ease-out;
    }
    .page-inner a[aria-label] {
      transition: transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out,
        background-color 350ms ease-out,
        color 350ms ease-out;
    }
    .page-inner a[aria-label]:hover {
      transform: translateY(-2px);
    }
    #codexAsk {
      transition: background-color 350ms ease-out,
        transform 350ms ease-out,
        box-shadow 350ms ease-out,
        color 350ms ease-out;
    }
    #codexAsk:hover {
      transform: translateY(-1px);
    }
    #codexQ {
      transition: border-color 350ms ease-out,
        box-shadow 350ms ease-out;
    }
    #codexClose {
      transition: background-color 350ms ease-out,
        color 350ms ease-out;
    }
    #github-years button {
      transition: border-color 350ms ease-out,
        background-color 350ms ease-out,
        color 350ms ease-out;
    }
    .page-inner input,
    .page-inner textarea {
      transition: border-color 350ms ease-out,
        box-shadow 350ms ease-out;
    }
    .page-inner .experience-card > *:first-child {
      margin-top: 0;
    }
    .page-inner .experience-card > *:last-child {
      margin-bottom: 0;
    }
    .page-inner section > .flex.flex-col > a.group,
    .page-inner section > .grid > div {
      background-clip: padding-box;
    }
    .page-inner section > .grid > div {
      transition:
        transform 350ms ease-out,
        box-shadow 350ms ease-out,
        border-color 350ms ease-out;
    }
    .page-inner section > .grid > div:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-hover-shadow);
      border-color: var(--card-hover-border);
    }
    .page-inner form button[type="submit"] {
      transition: background-color 350ms ease-out,
        color 350ms ease-out,
        transform 350ms ease-out,
        box-shadow 350ms ease-out;
    }
    .page-inner form button[type="submit"]:hover {
      transform: translateY(-2px);
    }
    #skillsCanvas {
      touch-action: none;
      transition: filter 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #skillTooltip {
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 14rem; z-index: 200;
    }
    #skillTooltip.vis { opacity: 1; }
    .page-loader {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09080B;
      transition: opacity 0.85s cubic-bezier(0.76, 0, 0.24, 1), visibility 0.85s step-end;
    }
    [data-theme="light"] .page-loader {
      background: #F7F2EC;
    }
    .page-loader.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-pct {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(4rem, 18vw, 11rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.06em;
      font-variant-numeric: tabular-nums;
      color: #F1EAE2;
    }
    [data-theme="light"] .loader-pct {
      color: #231B17;
    }
    .loader-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: rgba(241, 234, 226, 0.45);
      margin-bottom: 2rem;
    }
    [data-theme="light"] .loader-label {
      color: rgba(35, 27, 23, 0.45);
    }
    .loader-mark {
      margin-top: 2.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #C2A06B2E;
    }
    [data-theme="light"] .loader-mark {
      color: #5F727E;
    }
    @media (prefers-reduced-motion: reduce) {
      .page-loader { transition: opacity 0.2s ease; }
      .ambient-line, .noise-anim { animation: none !important; }
      .page-sheet { transition: none !important; }
      .pipeline-shimmer { animation: none !important; opacity: 0.5; }
      .experience-card, .experience-card::after { transition: none !important; }
      .experience-card:hover, .experience-card:focus-within { transform: none !important; }
      .experience-card:hover::after, .experience-card:focus-within::after { opacity: 0 !important; transform: none !important; }
      .page-inner a.group.block.rounded-2xl,
      .page-inner a.group.rounded-2xl,
      .page-inner .rounded-2xl,
      #skillsCanvas { transition: none !important; }
      .page-inner a.group.block.rounded-2xl:hover,
      .page-inner a.group.block.rounded-2xl:focus-visible,
      .page-inner a.group.rounded-2xl:hover,
      .page-inner a.group.rounded-2xl:focus-visible { transform: none !important; }
      .page-loader.done { transition: none; opacity: 0; visibility: hidden; }
      .magnetic, .cover-cta-primary, .cover-cta-secondary, .glow-ring,
      #tocNav button, .page-inner a[aria-label], #codexAsk, #codexQ,
      #codexClose, #github-years button, .page-inner input,
      .page-inner textarea, .page-inner section > .grid > div,
      .page-inner form button[type="submit"] { transition: none !important; }
      .page-inner section > .grid > div:hover,
      .page-inner form button[type="submit"]:hover { transform: none !important; }
    }
  </style>
</head>
<body class="min-h-full bg-cream font-sans text-inklight antialiased transition-colors duration-500 selection:bg-cyan-500/25 selection:text-inklight dark:bg-void dark:text-vellum dark:selection:text-white">
  <a href="#book" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[220] focus:rounded-md focus:bg-cyan-500 focus:px-3 focus:py-2 focus:text-void">Skip to codex</a>

  <div id="pageLoader" class="page-loader" role="status" aria-live="polite" aria-busy="true" aria-label="Loading portfolio">
    <p class="loader-label">Loading</p>
    <div id="loaderPct" class="loader-pct">00%</div>
  </div>

  <canvas id="netCanvas" class="pointer-events-none fixed inset-0 z-[4] opacity-[0.28] dark:opacity-[0.35]" aria-hidden="true"></canvas>
  <div class="pointer-events-none fixed inset-0 z-[6] noise noise-anim opacity-30 dark:opacity-50" aria-hidden="true"></div>
  <div id="ambient" class="pointer-events-none fixed inset-0 z-[7] overflow-hidden" aria-hidden="true"></div>

  <!-- Theme + sound + bot -->
  <div class="fixed right-3 top-3 z-[125] flex items-center gap-2 md:right-6 md:top-5">
    <button type="button" id="codexFab" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-stone-200/35 bg-cream/90 p-0 text-inklight shadow-editorial backdrop-blur-md transition hover:scale-[1.03] dark:border-white/20 dark:bg-ink/95 dark:text-vellum dark:shadow-none" aria-label="Open Codex assistant" aria-expanded="false" aria-controls="codexPanel">
      <svg class="block" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 5C4 3.89543 4.89543 3 6 3H14C16.2091 3 18 4.79086 18 7V12C18 14.2091 16.2091 16 14 16H9L5 20V7C4 7 4 6.10457 4 5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 7H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <path d="M8 10.5H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
      </svg>
    </button>
    <button type="button" id="soundBtn" class="flex h-10 w-10 items-center justify-center rounded-full border border-stone-200/25 bg-cream/90 text-[0.68rem] text-inklight shadow-editorial backdrop-blur-md transition hover:border-stone-300 dark:border-white/15 dark:bg-ink/90 dark:text-vellum/70 dark:shadow-none" aria-pressed="true" aria-label="Page turn sound on" title="Page sound">♪</button>
    <button type="button" id="themeToggle" class="flex h-10 w-10 items-center justify-center rounded-full border border-stone-200/25 bg-cream/90 text-inklight shadow-editorial backdrop-blur-md transition hover:border-stone-300 dark:border-white/15 dark:bg-ink/90 dark:text-vellum" aria-label="Toggle light theme">
      <svg id="iconSun" class="hidden h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg id="iconMoon" class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    </button>
  </div>

          uColor3: { value: new THREE.Color(theme.sphere3) }
        },
        vertexShader: 'varying vec3 vPosition; void main() { vPosition = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
        fragmentShader: 'uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2; uniform vec3 uColor3; varying vec3 vPosition; void main() { float t = sin(uTime * 0.5 + vPosition.y * 0.02) * 0.5 + 0.5; vec3 color = mix(uColor1, uColor2, t); color = mix(color, uColor3, sin(uTime * 0.3 + vPosition.x * 0.015) * 0.5 + 0.5); gl_FragColor = vec4(color, 0.15); }',
        wireframe: true,
        transparent: true,
        depthWrite: false
      });
      group.add(new THREE.Mesh(sphereGeo, sphereMat));

      var glowGeo = new THREE.SphereGeometry(60, 32, 32);
      var glowMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uGlow1: { value: new THREE.Vector3(theme.glow1[0], theme.glow1[1], theme.glow1[2]) },
          uGlow2: { value: new THREE.Vector3(theme.glow2[0], theme.glow2[1], theme.glow2[2]) }
        },
        vertexShader: 'varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
        fragmentShader: 'uniform float uTime; uniform vec3 uGlow1; uniform vec3 uGlow2; varying vec3 vNormal; void main() { float intensity = pow(0.85 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 4.0); vec3 color = mix(uGlow1, uGlow2, sin(uTime * 0.4) * 0.5 + 0.5); gl_FragColor = vec4(color, intensity * 0.12); }',
        transparent: true,
        depthWrite: false,
        side: THREE.BackSide
      });
      group.add(new THREE.Mesh(glowGeo, glowMat));

      function addRing(radius, rotX, rotY, color, opacity) {
        var ringGeo = new THREE.TorusGeometry(radius, 0.3, 8, 120);
        var ringMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: opacity });
        var ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = rotX;
        ring.rotation.y = rotY;
        group.add(ring);
        return ring;
      }
      var ring1 = addRing(105, Math.PI / 2, 0, theme.ring1, theme.ringOpacity[0]);
      var ring2 = addRing(108, Math.PI / 3, Math.PI / 6, theme.ring2, theme.ringOpacity[1]);
      var ring3 = addRing(102, -Math.PI / 4, Math.PI / 3, theme.ring3, theme.ringOpacity[2]);

      var particleCount = 200;
      var particleGeo = new THREE.BufferGeometry();
      var particlePositions = new Float32Array(particleCount * 3);
      var particleColors = new Float32Array(particleCount * 3);
      var palette = theme.particles.map(function (hex) { return new THREE.Color(hex); });
      for (var i = 0; i < particleCount; i++) {
        var phi = Math.random() * Math.PI * 2;
        var theta = Math.random() * Math.PI;
        var r = 80 + Math.random() * 80;
        particlePositions[i * 3] = r * Math.sin(theta) * Math.cos(phi);
        particlePositions[i * 3 + 1] = r * Math.sin(theta) * Math.sin(phi);
        particlePositions[i * 3 + 2] = r * Math.cos(theta);
        var c = palette[Math.floor(Math.random() * palette.length)];
        particleColors[i * 3] = c.r;
        particleColors[i * 3 + 1] = c.g;
        particleColors[i * 3 + 2] = c.b;
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
      var particleMat = new THREE.PointsMaterial({
        size: 1.5,
        transparent: true,
        opacity: 0.6,
        vertexColors: true,
        depthWrite: false,
        blending: theme.particleBlend
      });
      var particles = new THREE.Points(particleGeo, particleMat);
      group.add(particles);

      var N = GLOBE_SKILLS.length;
      var RADIUS = 100;
      var goldenAngle = Math.PI * (3 - Math.sqrt(5));
      var positions = GLOBE_SKILLS.map(function (_, iPos) {
        var y = 1 - (iPos / (N - 1)) * 2;
        var rr = Math.sqrt(1 - y * y);
        var theta = goldenAngle * iPos;
        return new THREE.Vector3(
          Math.cos(theta) * rr * RADIUS,
          y * RADIUS,
          Math.sin(theta) * rr * RADIUS
        );
      });

      function createSprite(skill, pos) {
        var size = 160;
        var c = document.createElement('canvas');
        c.width = size;
        c.height = size + 32;
        var ctx = c.getContext('2d');
        var texture = new THREE.CanvasTexture(c);
        var mat = new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
          depthWrite: false,
          blending: theme.spriteBlend
        });
        var sprite = new THREE.Sprite(mat);
        sprite.position.copy(pos);
        sprite.scale.set(32, 38.4, 1);
        group.add(sprite);

        function renderLabel() {
          var f = 18;
          ctx.font = '600 ' + f + 'px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
          while (ctx.measureText(skill.name).width > size && f > 12) {
            f--;
            ctx.font = '600 ' + f + 'px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
          }
          ctx.fillStyle = theme.label;
          ctx.textAlign = 'center';
          ctx.fillText(skill.name, size / 2, size + 16);
        }

        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function () {
          ctx.drawImage(img, (size - 80) / 2, 8, 80, 80);
          renderLabel();
          texture.needsUpdate = true;
        };
        img.onerror = function () {
          ctx.fillStyle = skill.color;
          ctx.font = 'bold 48px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(skill.name.charAt(0), size / 2, size / 2 + 16);
          renderLabel();
          texture.needsUpdate = true;
        };
        img.src = skill.iconUrl || 'https://cdn.simpleicons.org/' + skill.slug + '/' + skill.color.replace('#', '');
      }

      GLOBE_SKILLS.forEach(function (skill, idxSkill) { createSprite(skill, positions[idxSkill]); });

      var isDragging = false;
      var prevMouse = { x: 0, y: 0 };
      var rotVelocity = { x: 0.003, y: 0.005 };
      var onPointerDown = function (e) {
        isDragging = true;
        prevMouse = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing';
      };
      canvas.addEventListener('pointerdown', onPointerDown);
      var onPointerMove = function (e) {
        if (!isDragging) return;
        var dx = e.clientX - prevMouse.x;
        var dy = e.clientY - prevMouse.y;
        rotVelocity.y = dx * 0.002;
        rotVelocity.x = dy * 0.002;
        prevMouse = { x: e.clientX, y: e.clientY };
      };
      var onPointerUp = function () {
        isDragging = false;
        canvas.style.cursor = 'grab';
      };
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      canvas.style.cursor = 'grab';

      var clock = new THREE.Clock();
      function tick() {
        if (!skillsThree.active) return;
        skillsThree.anim = requestAnimationFrame(tick);
        var elapsed = clock.getElapsedTime();
        sphereMat.uniforms.uTime.value = elapsed;
        glowMat.uniforms.uTime.value = elapsed;
        if (mode === 'light') {
          ring1.material.color.setHSL((elapsed * 0.03 + 0.09) % 1, 0.42, 0.32);
          ring2.material.color.setHSL((elapsed * 0.03 + 0.22) % 1, 0.44, 0.34);
          ring3.material.color.setHSL((elapsed * 0.03 + 0.35) % 1, 0.44, 0.36);
          particleMat.opacity = 0.3 + Math.sin(elapsed * 1.5) * 0.1;
        } else {
          ring1.material.color.setHSL((elapsed * 0.05) % 1, 0.7, 0.6);
          ring2.material.color.setHSL((elapsed * 0.05 + 0.33) % 1, 0.7, 0.6);
          ring3.material.color.setHSL((elapsed * 0.05 + 0.66) % 1, 0.7, 0.6);
          particleMat.opacity = 0.4 + Math.sin(elapsed * 1.5) * 0.2;
        }
        if (!isDragging) {
          rotVelocity.x += (0.001 - rotVelocity.x) * 0.02;
          rotVelocity.y += (0.003 - rotVelocity.y) * 0.02;
        }
        group.rotation.x += rotVelocity.x;
        group.rotation.y += rotVelocity.y;
        group.children.forEach(function (child) {
          if (child.isSprite) {
            var worldPos = new THREE.Vector3();
            child.getWorldPosition(worldPos);
            var dist = worldPos.distanceTo(camera.position);
            var scale = THREE.MathUtils.mapLinear(dist, 200, 400, 1.1, 0.6);
            child.material.opacity = THREE.MathUtils.mapLinear(dist, 200, 400, 1, 0.3);
            child.scale.set(28 * scale, 32 * scale, 1);
          }
        });
        renderer.render(scene, camera);
      }

      function resize() {
        var w = container.clientWidth;
        var h = container.clientHeight || 550;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      }

      skillsThree.scene = scene;
      skillsThree.camera = camera;
      skillsThree.renderer = renderer;
      skillsThree.globe = group;
      skillsThree.ro = new ResizeObserver(resize);
      skillsThree.ro.observe(container);
      skillsThree.cleanup = function () {
        skillsThree.active = false;
        if (skillsThree.anim) cancelAnimationFrame(skillsThree.anim);
        if (skillsThree.ro) skillsThree.ro.disconnect();
        canvas.removeEventListener('pointerdown', onPointerDown);
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
        if (renderer) renderer.dispose();
      };
      resize();

      function start() {
        if (skillsThree.anim) cancelAnimationFrame(skillsThree.anim);
        skillsThree.active = true;
        tick();
      }
      function stop() {
        skillsThree.active = false;
        if (skillsThree.anim) cancelAnimationFrame(skillsThree.anim);
      }
      skillsThree.start = start;
      skillsThree.stop = stop;
    }

    function initGithubContributions() {
      if (githubLoaded) return;
      var container = document.getElementById('github-graph');
      var totalEl = document.getElementById('github-total');
      if (!container || !totalEl) return;
      githubLoaded = true;
      fetch('https://github-contributions-api.jogruber.de/v4/devyani089')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var points = Array.isArray(data.contributions) ? data.contributions : [];
          if (!points.length) throw new Error('no-data');
          var yearsEl = document.getElementById('github-years');
          var byYear = {};
          points.forEach(function (p) {
            var y = String(p.date).slice(0, 4);
            if (!byYear[y]) byYear[y] = [];
            byYear[y].push(p);
          });
          var years = Object.keys(byYear).sort(function (a, b) { return Number(b) - Number(a); });
          if (!years.length) throw new Error('no-year-data');
          var nowYear = String(new Date().getFullYear());
          var activeYear = byYear[nowYear] ? nowYear : years[0];

          function paintYearButtons() {
            if (!yearsEl) return;
            Array.prototype.forEach.call(yearsEl.querySelectorAll('button[data-year]'), function (btn) {
              var on = btn.getAttribute('data-year') === activeYear;
              btn.style.cssText = on
                ? 'border-color:var(--gh-tile-4);background:var(--gh-tile-4);color:var(--theme-bg);'
                : 'border-color:var(--border-subtle);background:transparent;color:var(--text-muted);';
            });
          }

          function renderYear(yearKey) {
            var tileData = (byYear[yearKey] || []).slice().sort(function (a, b) {
              return new Date(a.date) - new Date(b.date);
            });
            if (!tileData.length) return;
            var total = tileData.reduce(function (sum, p) { return sum + (Number(p.count) || 0); }, 0);
            totalEl.innerHTML = '<strong>' + total.toLocaleString() + '</strong> contributions in ' + yearKey;

            var first = new Date(yearKey + '-01-01T00:00:00Z');
            var padding = first.getUTCDay();
            var totalCols = Math.ceil((padding + tileData.length) / 7);
            var maxW = Math.max(container.clientWidth - 8, 220);
            var gap = maxW < 420 ? 1.5 : 3;
            var cell = (maxW - (totalCols - 1) * gap) / totalCols;
            if (cell < 2) {
              gap = 1;
              cell = (maxW - (totalCols - 1) * gap) / totalCols;
            }
            cell = Number(Math.max(1, cell).toFixed(2));

            var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            var monthStarts = [];
            var cur = -1;
            tileData.forEach(function (p, i) {
              var m = parseInt(p.date.slice(5, 7), 10) - 1;
              if (m !== cur) {
                cur = m;
                monthStarts.push({ name: monthNames[m], col: Math.floor((i + padding) / 7) });
              }
            });

            var labels = document.createElement('div');
            labels.style.cssText = 'display:grid;grid-template-columns:repeat(' + totalCols + ',' + cell + 'px);gap:' + gap + 'px;margin-bottom:6px;font-family:\"IBM Plex Mono\",monospace;font-size:0.62rem;color:var(--text-muted);';
            for (var c = 0; c < totalCols; c++) {
              var lab = document.createElement('div');
              var entry = monthStarts.find(function (m) { return m.col === c; });
              if (entry) lab.textContent = entry.name;
              labels.appendChild(lab);
            }

            var grid = document.createElement('div');
            grid.style.cssText = 'display:grid;grid-template-rows:repeat(7,' + cell + 'px);grid-template-columns:repeat(' + totalCols + ',' + cell + 'px);grid-auto-flow:column;gap:' + gap + 'px;';
            for (var pi = 0; pi < padding; pi++) grid.appendChild(document.createElement('div'));
            tileData.forEach(function (p) {
              var count = Number(p.count || 0);
              var level = 0;
              if (count > 0 && count <= 2) level = 1;
              else if (count > 2 && count <= 5) level = 2;
              else if (count > 5 && count <= 9) level = 3;
              else if (count > 9) level = 4;
              var tile = document.createElement('div');
              tile.style.cssText = 'box-sizing:border-box;border-radius:2px;background:var(--gh-tile-' + level + ');box-shadow:inset 0 0 0 1px var(--gh-tile-stroke);';
              tile.title = count + ' contributions on ' + p.date;
              grid.appendChild(tile);
            });

            container.innerHTML = '';
            var wrap = document.createElement('div');
            wrap.style.cssText = 'width:100%;';
            wrap.appendChild(labels);
            wrap.appendChild(grid);
            container.appendChild(wrap);
          }

          if (yearsEl) {
            yearsEl.innerHTML = '';
            years.forEach(function (y) {
              var btn = document.createElement('button');
              btn.type = 'button';
              btn.setAttribute('data-year', y);
              btn.className = 'rounded-full border px-3 py-1 font-mono text-[0.62rem] uppercase tracking-[0.14em] transition';
              btn.textContent = y;
              btn.addEventListener('click', function () {
                activeYear = y;
                renderYear(activeYear);
                paintYearButtons();
              });
              yearsEl.appendChild(btn);
            });
          }

          renderYear(activeYear);
          paintYearButtons();
          window.addEventListener('resize', function () { renderYear(activeYear); });
        })
        .catch(function () {
          totalEl.textContent = 'Contribution data unavailable right now.';
          container.innerHTML = '<p class="py-6 text-center font-mono text-xs text-stone-500 dark:text-vellum/45">Could not load contribution tiles.</p>';
        });
    }

    function setDynamicPageActive() {
      var si = PAGES.map(function (p) { return p.id; }).indexOf('skills');
      var gi = PAGES.map(function (p) { return p.id; }).indexOf('github');
      if (skillsThree.start) {
        if (idx === si) skillsThree.start();
        else skillsThree.stop();
      }
      if (idx === gi) initGithubContributions();
    }

    var tocEl = document.getElementById('toc');
    var tocBtn = document.getElementById('tocToggle');
    function closeToc() {
      if (matchMedia('(max-width:767px)').matches) {
        tocEl.classList.add('-translate-x-full');
        tocBtn.setAttribute('aria-expanded', 'false');
      }
    }
    tocBtn.addEventListener('click', function () {
      var open = tocEl.classList.toggle('-translate-x-full');
      tocBtn.setAttribute('aria-expanded', open ? 'false' : 'true');
    });

    function applyTheme(light) {
      var root = document.documentElement;
      if (light) {
        root.setAttribute('data-theme', 'light');
        root.classList.remove('dark');
        document.getElementById('iconSun').classList.add('hidden');
        document.getElementById('iconMoon').classList.remove('hidden');
      } else {
        root.removeAttribute('data-theme');
        root.classList.add('dark');
        document.getElementById('iconSun').classList.remove('hidden');
        document.getElementById('iconMoon').classList.add('hidden');
      }
      try { localStorage.setItem('codexTheme', light ? 'light' : 'dark'); } catch (e) {}
      var si = PAGES.map(function (p) { return p.id; }).indexOf('skills');
      if (idx === si && document.getElementById('skillsCanvas')) {
        initSkillsThree();
        if (skillsThree.start) skillsThree.start();
      }
    }
    document.getElementById('themeToggle').addEventListener('click', function () {
      applyTheme(!document.documentElement.getAttribute('data-theme'));
    });
    try {
      if (localStorage.getItem('codexTheme') === 'light') applyTheme(true);
      else applyTheme(false);
    } catch (e) {
      applyTheme(false);
    }

    document.getElementById('soundBtn').addEventListener('click', function () {
      soundOn = !soundOn;
      this.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
      this.setAttribute('aria-label', soundOn ? 'Page turn sound on' : 'Page turn sound off');
      this.textContent = soundOn ? '♪' : 'ø';
    });

    document.getElementById('prev').addEventListener('click', function () { go(idx - 1); });
    document.getElementById('next').addEventListener('click', function () { go(idx + 1); });
    addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); go(idx + 1); }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(idx - 1); }
    });
    document.addEventListener('click', function (e) {
      var t = e.target;
      if (t && t.getAttribute && t.getAttribute('data-go')) go(parseInt(t.getAttribute('data-go'), 10));
      if (!audioUnlocked) {
        audioUnlocked = true;
        try {
          ensureFlipAudio();
          flipAudioPool.forEach(function (a) { a.load(); });
        } catch (err) {}
      }
    });

    var codexPanel = document.getElementById('codexPanel');
    var codexFab = document.getElementById('codexFab');
    document.getElementById('codexClose').addEventListener('click', function () {
      codexPanel.classList.add('hidden');
      codexPanel.classList.remove('flex');
      codexFab.setAttribute('aria-expanded', 'false');
    });
    codexFab.addEventListener('click', function () {
      var open = codexPanel.classList.toggle('hidden');
      codexPanel.classList.toggle('flex', !open);
      codexFab.setAttribute('aria-expanded', open ? 'false' : 'true');
      if (!open) document.getElementById('codexQ').focus();
    });
    var FAQ = [
      { k: ['work', 'outcomes', 'job'], a: 'She engineers data curation and model fine-tuning at OutcomesAI in Bengaluru — RAG, OCR, and clinical integrations.' },
      { k: ['rag', 'context', 'project'], a: 'Context-RAG: hybrid retrieval over medical textbooks with Milvus, SBERT, BM25, and RAPTOR-class indexing.' },
      { k: ['webkit'], a: 'WEBKIT automates React project scaffolding — faster setup with Python and Tkinter.' },
      { k: ['phi', 'llm', 'fine'], a: 'She fine-tunes Phi-4 and works across LLaMA-class stacks and Gemini in production paths.' },
      { k: ['fhir', 'hl7', 'epic'], a: 'FHIR R2 and HL7 for AthenaHealth and Epic — production interoperability.' },
      { k: ['email', 'contact', 'reach'], a: 'devyaniarya77@gmail.com — open to selective collaborations.' }
    ];
    document.getElementById('codexAsk').addEventListener('click', function () {
      var q = (document.getElementById('codexQ').value || '').toLowerCase();
      var ans = 'Try keywords: RAG, FHIR, OutcomesAI, Phi-4, or WEBKIT.';
      outer: for (var i = 0; i < FAQ.length; i++) {
        for (var j = 0; j < FAQ[i].k.length; j++) {
          if (q.indexOf(FAQ[i].k[j]) !== -1) { ans = FAQ[i].a; break outer; }
        }
      }
      document.getElementById('codexA').textContent = ans;
    });

    function finishLoader(done) {
      var loader = document.getElementById('pageLoader');
      var pctEl = document.getElementById('loaderPct');
      if (!loader || !pctEl) {
        done();
        return;
      }
      if (reduced) {
        pctEl.textContent = '100%';
        loader.classList.add('done');
        loader.setAttribute('aria-busy', 'false');
        done();
        return;
      }
      var p = 0;
      function tick() {
        p += Math.random() * 22 + 7;
        if (p > 100) p = 100;
        pctEl.textContent = String(Math.floor(p)).padStart(2, '0') + '%';
        if (p < 100) {
          setTimeout(tick, 32 + Math.random() * 48);
        } else {
          setTimeout(function () {
            loader.classList.add('done');
            loader.setAttribute('aria-busy', 'false');
            setTimeout(done, 720);
          }, 120);
        }
      }
      tick();
    }

    build();
    layout();
    updateUi();
    ambientLines();
    requestAnimationFrame(magneticInit);

    finishLoader(function () {
      if (window.gsap && !reduced) {
        gsap.set(sheets(), { transformPerspective: 1600 });
        gsap.fromTo(sheets()[0], { rotateY: 85, opacity: 0 }, { duration: 1, rotateY: 0, opacity: 1, ease: 'power3.out' });
        syncRest();
      }
      initNetCanvas();
      initSkillsThree();
      setDynamicPageActive();
    });

    document.addEventListener('visibilitychange', function () {
      if (document.hidden && skillsThree.stop) skillsThree.stop();
      else setDynamicPageActive();
    });
  })();
  </script>
